<script>

const SENHA="#acm262#diariomusical";

let db={

turmas:[],
musicas:[],
instrumentos:[],
planos:[],
registros:[],

config:{
apiKey:""
}

}

/* LOGIN */

function login(){

let s=document.getElementById("senha").value;

if(s===SENHA){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

load();

renderAll();

}else{

alert("Senha errada");

}

}

/* STORAGE */

function save(){

localStorage.setItem(
"diario3",
JSON.stringify(db)
);

}

function load(){

let d=localStorage.getItem("diario3");

if(d){

db=JSON.parse(d);

}

}

/* SELECT TURMAS */

function renderSelectTurmas(){

let el=document.getElementById("selectTurmaPlano");

if(!el) return;

el.innerHTML='<option value="">Escolher</option>';

db.turmas.forEach(t=>{

el.innerHTML+=`
<option value="${t.id}">
${t.nome}
</option>
`;

});

}

/* GLOBAL */

function renderAll(){

renderDashboard();
renderTurmas();
renderSelectTurmas();
renderRegistros();

}

/* IA */

async function gerarPlanoIA(){

let id=document.getElementById("selectTurmaPlano").value;

let turma=db.turmas.find(t=>t.id==id);

if(!turma){

alert("Escolha turma");

return;

}

let prompt=montarPrompt(turma);

enviarParaClaude(prompt,turma);

}

async function gerarContinuacaoPlano(){

let id=document.getElementById("selectTurmaPlano").value;

let turma=db.turmas.find(t=>t.id==id);

if(!turma){

alert("Escolha turma");

return;

}

let ultimoPlano=

turma.planos.length ?
turma.planos[turma.planos.length-1].conteudo :
"";

let prompt=`

Continue a sequência pedagógica:

${ultimoPlano}

Crie a próxima aula.

`;

enviarParaClaude(prompt,turma);

}

async function gerarAvaliacaoIA(){

let id=document.getElementById("selectTurmaPlano").value;

let turma=db.turmas.find(t=>t.id==id);

if(!turma){

alert("Escolha turma");

return;

}

let registros=db.registros

.filter(r=>r.turma===turma.nome)

.map(r=>r.aluno+" "+r.texto)

.join("\n");

let prompt=`

Crie avaliação pedagógica baseada:

${registros}

`;

enviarParaClaude(prompt);

}

async function enviarParaClaude(prompt,turma){

document.getElementById("areaPlano")
.innerHTML="Gerando...";

try{

let r=await fetch("/api/claude",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt
})

});

let data=await r.json();

let texto=data?.text || "Erro IA";

if(turma){

let plano={

id:Date.now(),

data:new Date().toLocaleDateString(),

conteudo:texto

};

turma.planos.push(plano);

db.planos.push(plano);

save();

}

document.getElementById("areaPlano")
.innerHTML=formatPlano(texto);

}catch(e){

alert("Erro IA");

}

}

/* PROMPT */

function montarPrompt(t){

let instrumentos=db.instrumentos
.map(i=>i.nome)
.join(", ");

let musicas=db.musicas
.map(m=>m.nome)
.join(", ");

let planosAnteriores=t.planos
.map(p=>p.conteudo)
.slice(-3)
.join("\n");

let registrosTurma=db.registros
.filter(r=>r.turma===t.nome)
.slice(-10)
.map(r=>r.aluno+": "+r.texto)
.join("\n");

return `

Você é especialista em educação musical infantil.

Turma:
${t.nome}

Faixa:
${t.faixa}

Tema anual:
${t.tema}

Objetivo:
${t.objetivo}

Planos anteriores:
${planosAnteriores}

Registros:
${registrosTurma}

Instrumentos:
${instrumentos}

Repertório:
${musicas}

Crie plano estruturado.

`;

}

/* FORMATAR */

function formatPlano(t){

return `

<div class="card">

<h3>Plano gerado</h3>

<pre>

${t}

</pre>

</div>

`;

}

/* REGISTROS */

function renderRegistros(){

let el=document.getElementById("painelRegistros");

if(!db.registros || db.registros.length===0){

el.innerHTML="Sem registros";

return;

}

el.innerHTML=db.registros

.slice(-30)

.reverse()

.map(r=>`

<div class="registroItem">

<b>${r.aluno}</b>

<br>

${r.texto}

<br>

<small>

${r.turma}

</small>

<br>

<small>

${r.data}

</small>

</div>

`)

.join("");

}

function salvarApi(){

db.config.apiKey=
document.getElementById("apiKey").value;

save();

alert("API salva");

}

</script>
