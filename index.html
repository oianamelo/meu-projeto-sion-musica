<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diário Musical</title>

<style>

:root{

--amarelo:#FFD54A;
--preto:#121212;
--cinza1:#1e1e1e;
--cinza2:#252525;

}

body{

margin:0;
font-family:Arial;
background:var(--preto);
color:white;

}

.login{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#FFD54A,#FFB300);

}

.loginCard{

background:white;
color:black;
padding:40px;
border-radius:15px;
width:320px;
text-align:center;

}

.app{

display:none;

}

.sidebar{

width:260px;
position:fixed;
left:0;
top:0;
height:100vh;
background:var(--cinza1);
padding:20px;

}

.main{

margin-left:260px;
margin-right:260px;
padding:25px;

}

.rightPanel{

width:260px;
position:fixed;
right:0;
top:0;
height:100vh;
background:var(--cinza1);
padding:15px;
overflow:auto;

}

.card{

background:var(--cinza1);
padding:20px;
border-radius:10px;
margin-bottom:15px;

}

button{

background:#FFD54A;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;

}

.btn2{

background:var(--cinza2);
color:white;

}

.turma{

background:var(--cinza2);
padding:12px;
margin-top:10px;
border-radius:8px;

}

.registro{

background:var(--cinza2);
padding:8px;
margin-bottom:8px;
border-radius:6px;
font-size:13px;

}

input,textarea,select{

width:100%;
padding:8px;
margin-top:5px;
background:var(--cinza2);
border:1px solid #444;
color:white;
border-radius:6px;

}

.modal{

display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;

}

.modalBox{

background:var(--cinza1);
padding:25px;
border-radius:10px;
width:400px;

}

</style>

</head>

<body>

<div class="login" id="login">

<div class="loginCard">

<h2>Diário Musical</h2>

<input type="password" id="senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<div class="app" id="app">

<div class="sidebar">

<h3>Diário Musical</h3>

<button onclick="ir('dashboard')">Dashboard</button>

<button onclick="ir('turmas')">Turmas</button>

<button onclick="ir('planos')">Planos IA</button>

</div>

<div class="rightPanel">

<h3>Registros</h3>

<div id="painelRegistros"></div>

</div>

<div class="main">

<div id="dashboard">

<h2>Dashboard</h2>

<button onclick="abrirNovaTurma()">Nova turma</button>

<div id="dashTurmas"></div>

</div>

<div id="turmas" style="display:none">

<h2>Turmas</h2>

<div id="listaTurmas"></div>

</div>

<div id="planos" style="display:none">

<h2>Planos IA</h2>

<select id="selectTurmaPlano"></select>

<br><br>

<button onclick="gerarPlanoIA()">Gerar plano novo</button>

<button onclick="gerarContinuacao()">Continuação</button>

<button onclick="gerarAvaliacao()">Avaliação</button>

<div id="areaPlano"></div>

</div>

</div>

</div>

<div class="modal" id="modalTurma">

<div class="modalBox">

<h3>Nova turma</h3>

Nome:

<input id="turmaNome">

Faixa:

<select id="turmaFaixa">

<option>INF2</option>
<option>INF3</option>
<option>INF4</option>
<option>INF5</option>

</select>

Tema:

<input id="turmaTema">

Objetivo:

<textarea id="turmaObjetivo"></textarea>

<button onclick="salvarTurma()">Salvar</button>

<button onclick="fecharModal()">Cancelar</button>

</div>

</div>

<script>

const SENHA="#acm262#diariomusical";

let db={

turmas:[],
planos:[],
registros:[],
config:{apiKey:""}

};

function login(){

let s=document.getElementById("senha").value;

if(s===SENHA){

document.getElementById("login").style.display="none";

document.getElementById("app").style.display="block";

load();

renderAll();

}else{

alert("Senha errada");

}

}

function ir(t){

["dashboard","turmas","planos"]

.forEach(x=>{

document.getElementById(x).style.display="none";

});

document.getElementById(t).style.display="block";

}

function save(){

localStorage.setItem("diario",JSON.stringify(db));

}

function load(){

let d=localStorage.getItem("diario");

if(d) db=JSON.parse(d);

}

function abrirNovaTurma(){

document.getElementById("modalTurma").style.display="flex";

}

function fecharModal(){

document.getElementById("modalTurma").style.display="none";

}

function salvarTurma(){

let t={

id:Date.now(),

nome:turmaNome.value,

faixa:turmaFaixa.value,

tema:turmaTema.value,

objetivo:turmaObjetivo.value,

alunos:[],

planos:[]

};

db.turmas.push(t);

save();

fecharModal();

renderAll();

}

function renderAll(){

renderTurmas();

renderDashboard();

renderSelect();

renderRegistros();

}

function renderTurmas(){

let el=listaTurmas;

el.innerHTML="";

db.turmas.forEach(t=>{

el.innerHTML+=`

<div class="turma">

<b>${t.nome}</b>

<br>

<button onclick="abrirTurma(${t.id})">

Abrir

</button>

</div>

`;

});

}

function renderDashboard(){

dashTurmas.innerHTML="";

db.turmas.forEach(t=>{

dashTurmas.innerHTML+=`

<div class="turma">

${t.nome}

</div>

`;

});

}

function renderSelect(){

let el=selectTurmaPlano;

el.innerHTML="<option value=''>Escolher</option>";

db.turmas.forEach(t=>{

el.innerHTML+=`

<option value="${t.id}">

${t.nome}

</option>

`;

});

}

let turmaAtual=null;

function abrirTurma(id){

turmaAtual=db.turmas.find(t=>t.id===id);

ir("turmas");

listaTurmas.innerHTML=`

<div class="card">

<h3>${turmaAtual.nome}</h3>

Tema: ${turmaAtual.tema}

<br><br>

<button onclick="novoAluno()">

Novo aluno

</button>

</div>

`;

}

function novoAluno(){

let nome=prompt("Aluno");

if(!nome)return;

turmaAtual.alunos.push({

id:Date.now(),

nome:nome,

registros:[]

});

save();

}

function registrar(aluno){

let texto=prompt("Registro");

let r={

data:new Date().toLocaleDateString(),

texto:texto,

aluno:aluno.nome,

turma:turmaAtual.nome

};

aluno.registros.push(r);

db.registros.push(r);

save();

renderRegistros();

}

function renderRegistros(){

painelRegistros.innerHTML="";

db.registros.slice(-20).reverse()

.forEach(r=>{

painelRegistros.innerHTML+=`

<div class="registro">

<b>${r.aluno}</b>

<br>

${r.texto}

<br>

${r.turma}

</div>

`;

});

}

async function gerarPlanoIA(){

let id=selectTurmaPlano.value;

let turma=db.turmas.find(t=>t.id==id);

if(!turma){

alert("Escolha turma");

return;

}

let prompt=`

Crie plano de aula musical.

Turma: ${turma.nome}

Tema: ${turma.tema}

Objetivo: ${turma.objetivo}

`;

enviarIA(prompt,turma);

}

async function gerarContinuacao(){

let id=selectTurmaPlano.value;

let turma=db.turmas.find(t=>t.id==id);

let ultimo=

turma.planos.length?

turma.planos[turma.planos.length-1].conteudo:

"";

let prompt=

"Continue a sequência pedagógica:\n"+ultimo;

enviarIA(prompt,turma);

}

async function gerarAvaliacao(){

let id=selectTurmaPlano.value;

let turma=db.turmas.find(t=>t.id==id);

let registros=

db.registros

.filter(r=>r.turma===turma.nome)

.map(r=>r.texto)

.join("\n");

let prompt=

"Crie avaliação pedagógica:\n"+registros;

enviarIA(prompt);

}

async function enviarIA(prompt,turma){

areaPlano.innerHTML="Gerando...";

try{

let r=await fetch("/api/claude",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({prompt})

});

let data=await r.json();

let texto=data.text;

if(turma){

let plano={

id:Date.now(),

data:new Date().toLocaleDateString(),

conteudo:texto

};

turma.planos.push(plano);

db.planos.push(plano);

save();

}

areaPlano.innerHTML=

"<pre>"+texto+"</pre>";

}catch{

alert("Erro IA");

}

}

</script>

</body>
</html>
