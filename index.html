<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diário Musical</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--amarelo:#FFD54A;
--preto:#121212;
--cinza:#2a2a2a;
--cinza2:#1e1e1e;
--branco:#ffffff;
--card:#202020;
}

body{
margin:0;
font-family:system-ui;
background:var(--preto);
color:white;
}

.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#FFD54A,#FFB300);
}

.loginCard{
background:white;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
color:black;
}

.loginCard input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:1px solid #ccc;
}

.loginCard button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
background:#FFD54A;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.app{
display:none;
height:100vh;
}

.sidebar{
width:260px;
background:var(--cinza2);
padding:20px;
position:fixed;
height:100%;
}

.logo{
font-size:22px;
font-weight:bold;
color:var(--amarelo);
margin-bottom:30px;
}

.menuItem{
padding:12px;
border-radius:8px;
cursor:pointer;
margin-bottom:6px;
}

.menuItem:hover{
background:var(--cinza);
}

.main{
margin-left:260px;
padding:30px;
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
background:var(--amarelo);
border:none;
padding:10px 16px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

input,select,textarea{
background:#2a2a2a;
border:1px solid #444;
color:white;
padding:10px;
border-radius:8px;
width:100%;
margin-top:6px;
}

.turma{
background:#2a2a2a;
padding:15px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.turma:hover{
background:#333;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="login" id="login">

<div class="loginCard">

<h2>Diário Musical</h2>

<p>acesso do professor</p>

<input type="password" id="senha">

<button onclick="login()">
Entrar
</button>

</div>

</div>

<div class="app" id="app">

<div class="sidebar">

<div class="logo">
🎵 Diário Musical
</div>

<div class="menuItem" onclick="abrir('dashboard')">
Dashboard
</div>

<div class="menuItem" onclick="abrir('turmas')">
Turmas
</div>

<div class="menuItem" onclick="abrir('repertorio')">
Repertório
</div>

<div class="menuItem" onclick="abrir('instrumentos')">
Instrumentos
</div>

<div class="menuItem" onclick="abrir('backup')">
Backup
</div>

</div>

<div class="main">

<div id="dashboard">

<div class="top">

<h2>Dashboard</h2>

<button onclick="novaTurma()">
Nova turma
</button>

</div>

<div class="card">

<h3>Resumo pedagógico</h3>

<p id="resumo">
Nenhuma turma ainda
</p>

</div>

</div>

<div id="turmas" style="display:none">

<h2>Turmas</h2>

<div class="card">

<h3>Nova turma</h3>

<label>Nome</label>
<input id="nomeTurma">

<label>Faixa</label>

<select id="faixa">

<option>INF2</option>
<option>INF3</option>
<option>INF4</option>
<option>INF5</option>
<option>1ANO</option>
<option>2ANO</option>
<option>3ANO</option>
<option>4ANO</option>
<option>5ANO</option>

</select>

<label>Tema anual</label>
<input id="tema">

<label>Objetivo trimestre</label>
<input id="objetivo">

<label>Dificuldades</label>
<textarea id="dificuldades"></textarea>

<button onclick="salvarTurma()">
Salvar turma
</button>

</div>

<div id="listaTurmas"></div>

</div>

<div id="repertorio" style="display:none">

<h2>Repertório</h2>

<div class="card">

<input id="musica" placeholder="nome">

<input id="artista" placeholder="artista">

<input id="spotify" placeholder="spotify">

<button onclick="salvarMusica()">
Salvar
</button>

</div>

<div id="listaMusicas"></div>

</div>

<div id="instrumentos" style="display:none">

<h2>Instrumentos</h2>

<div class="card">

<input id="instrumento">

<button onclick="salvarInstrumento()">
Adicionar
</button>

</div>

<div id="listaInstrumentos"></div>

</div>

<div id="backup" style="display:none">

<h2>Backup</h2>

<div class="card">

<button onclick="exportar()">
Exportar JSON
</button>

<input type="file" onchange="importar(event)">

</div>

</div>

</div>

</div>

<script>

const senhaSistema="#acm262#diariomusical"

function login(){

if(
document.getElementById("senha").value
===senhaSistema
){

document.getElementById("login").style.display="none"

document.getElementById("app").style.display="block"

carregar()

}
else{

alert("senha incorreta")

}

}

const supabaseClient =
supabase.createClient(
"https://yyunoxlgbnxgjixzahce.supabase.co",
"sb_publishable_n7SpGZZSRG_hyomw3rnuNw_bknbpFnq"
)

let database={

turmas:[],
musicas:[],
instrumentos:[]

}

function salvarLocal(){

localStorage.setItem(
"diario",
JSON.stringify(database)
)

}

function carregar(){

let dados=
localStorage.getItem("diario")

if(dados){

database=
JSON.parse(dados)

}

render()

}

function abrir(tela){

["dashboard","turmas","repertorio","instrumentos","backup"]

.forEach(t=>{

document.getElementById(t)
.style.display="none"

})

document.getElementById(tela)
.style.display="block"

}

function salvarTurma(){

let t={

nome:nomeTurma.value,

faixa:faixa.value,

tema:tema.value,

objetivo:objetivo.value,

dificuldades:dificuldades.value

}

database.turmas.push(t)

salvarLocal()

render()

}

function salvarMusica(){

database.musicas.push({

nome:musica.value,

artista:artista.value,

spotify:spotify.value

})

salvarLocal()

render()

}

function salvarInstrumento(){

database.instrumentos.push({

nome:instrumento.value

})

salvarLocal()

render()

}

function render(){

listaTurmas.innerHTML=""

database.turmas.forEach(t=>{

listaTurmas.innerHTML+=`

<div class="turma">

<b>${t.nome}</b>

<p>${t.tema}</p>

</div>

`

})

listaMusicas.innerHTML=""

database.musicas.forEach(m=>{

listaMusicas.innerHTML+=`

<div class="turma">

${m.nome}

</div>

`

})

listaInstrumentos.innerHTML=""

database.instrumentos.forEach(i=>{

listaInstrumentos.innerHTML+=`

<div class="turma">

${i.nome}

</div>

`

})

resumo.innerText=
database.turmas.length+
" turmas cadastradas"

}

function exportar(){

let data=
JSON.stringify(database)

let blob=
new Blob([data])

let a=
document.createElement("a")

a.href=
URL.createObjectURL(blob)

a.download="backup.json"

a.click()

}

function importar(e){

let file=
e.target.files[0]

let reader=
new FileReader()

reader.onload=function(){

database=
JSON.parse(reader.result)

salvarLocal()

render()

}

reader.readAsText(file)

}

</script>

</body>
</html>
